<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iran Peace Talks — Market Briefings</title>
<style>
  :root {
    --folder-bg: #f5e9c8;
    --folder-edge: #c9b483;
    --folder-active: #fff8e1;
    --page-bg: #efe7d3;
    --ink: #2c2a26;
    --ink-soft: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--page-bg);
    color: var(--ink);
  }
  header {
    padding: 1rem 1.25rem 0.5rem;
    border-bottom: 1px solid var(--folder-edge);
    background: var(--page-bg);
  }
  header h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  header .updated {
    margin-top: 0.15rem;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }
  .tab-strip {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 2px;
    padding: 0.75rem 1rem 0;
    background: var(--page-bg);
    scrollbar-width: thin;
  }
  .folder-tab {
    flex: 0 0 auto;
    background: var(--folder-bg);
    border: 1px solid var(--folder-edge);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 0.5rem 0.9rem 0.55rem;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    line-height: 1.15;
    color: var(--ink);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.04);
    transition: background 0.12s;
  }
  .folder-tab:hover { background: #fbeec3; }
  .folder-tab.active {
    background: var(--folder-active);
    box-shadow: inset 0 -3px 0 var(--folder-active);
    position: relative;
    z-index: 2;
  }
  .folder-tab .tab-date {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
  }
  .folder-tab .tab-meta {
    display: block;
    font-size: 0.7rem;
    color: var(--ink-soft);
    margin-top: 0.1rem;
  }
  .frame-wrap {
    background: #fff;
    border-top: 2px solid var(--folder-edge);
    height: calc(100vh - 130px);
    min-height: 400px;
  }
  #briefing-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  footer {
    padding: 0.6rem 1.25rem;
    font-size: 0.72rem;
    color: var(--ink-soft);
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>Iran Peace Talks — Market Briefings</h1>
  <div class="updated">Index updated April 15, 2026 11:04 PM ET · 3 briefings on file</div>
</header>
<nav class="tab-strip" aria-label="Briefing archive">
<button class="folder-tab active" data-src="briefings/briefing_20260415_1230_midday.html" title="Midday — 2026-04-15 12:30"><span class="tab-date">Apr 15</span><span class="tab-meta">Midday · 12:30 PM</span></button>
<button class="folder-tab" data-src="briefings/briefing_20260414_2134_pre_market.html" title="Pre Market — 2026-04-14 21:34"><span class="tab-date">Apr 14</span><span class="tab-meta">Pre Market · 9:34 PM</span></button>
<button class="folder-tab" data-src="briefings/briefing_20260414_2003_pre_market.html" title="Pre Market — 2026-04-14 20:03"><span class="tab-date">Apr 14</span><span class="tab-meta">Pre Market · 8:03 PM</span></button>
</nav>
<main class="frame-wrap">
<iframe id="briefing-frame" src="briefings/briefing_20260415_1230_midday.html" title="Latest briefing"></iframe>
</main>
<footer>Automated analytical commentary generated via Claude Code with web search. Not investment advice.</footer>
<script>
  document.querySelectorAll('.folder-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const src = tab.getAttribute('data-src');
      const frame = document.getElementById('briefing-frame');
      if (frame && src) frame.src = src;
    });
  });
</script>
</body>
</html>
